<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى حبيبتي</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            color: #d93838;
        }
        .container {
            background-color: white;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 {
            font-size: 24px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #555;
        }
        .heart {
            font-size: 50px;
            color: #ff4d4d;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>إلى أجمل إنسانة في حياتي</h1>
        <p>أردت أن أصنع لكِ شيئاً مميزاً يعبر عن حبي لكِ. كل يوم معكِ هو أجمل يوم في عمري.</p>
        <p>أحبكِ جداً ❤️</p>
    </div>

</body>
</html>
