<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكاننا الخاص ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            color: #d93838;
        }
        .container {
            background-color: white;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 85%;
            display: none; /* مخفي حتى إدخال كلمة السر */
        }
        .password-box {
            background-color: white;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 85%;
            display: block;
        }
        h1 { font-size: 24px; }
        p { font-size: 18px; line-height: 1.6; color: #555; }
        .heart {
            font-size: 50px;
            color: #ff4d4d;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat { to { transform: scale(1.1); } }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #ffb3b3;
            text-align: center;
            width: 80%;
            margin-bottom: 15px;
        }
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .img-container {
            margin: 20px 0;
        }
        .img-container img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            margin: 10px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="lockScreen" class="password-box">
        <div style="font-size: 40px;">🔒</div>
        <h2>هذا الموقع خاص جداً</h2>
        <p>الرجاء إدخال كلمة السر لرؤية المفاجأة:</p>
        <input type="text" id="passwordInput" placeholder="اكتب كلمة السر هنا...">
        <br>
        <button onclick="checkPassword()">دخول ❤️</button>
        <p id="errorMsg" style="color: red; font-size: 14px; display: none;">كلمة السر غير صحيحة، حاول مجدداً يا جميل!</p>
    </div>

    <div id="secretContent" class="container">
        <div class="heart">❤️</div>
        <h1>إلى أجمل إنسانة في حياتي</h1>
        
        <p>أردت أن أصنع لكِ شيئاً مميزاً يعبر عن حبي لكِ. كل يوم معكِ هو أجمل يوم في عمري.</p>
        <p>أحبكِ جداً يا كل حياتي ❤️</p>
        
        <div class="img-container">
            <img src="me.jpg" alt="صورتي">
            <img src="us.jpg" alt="صورتنا">
        </div>
    </div>

    <script>
        function checkPassword() {
            var password = document.getElementById("passwordInput").value;
            // التحقق من كلمة السر love💕
            if (password === "love💕") {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("secretContent").style.display = "block";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }
    </script>

</body>
</html>
